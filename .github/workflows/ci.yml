name: CI

on:
  push:
    branches: [main, master, flagship]
  pull_request:

jobs:
  build-and-test:
    name: node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint (strict type-check of src + tests)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Build tests
        run: npm run build:test

      - name: Test
        run: npm test

  demos:
    name: demos (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run demos (POSIX)
        if: runner.os != 'Windows'
        run: bash demos/run_all.sh
      - name: Run demos (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: demos/run_all.ps1
